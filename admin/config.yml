# Izcalli content editor (Decap CMS) — login via DecapBridge (PKCE).
# -----------------------------------------------------------------------------
# Backend config generated by DecapBridge for this site. Editors log in by email
# (Google / Microsoft / password); no GitHub account needed.
backend:
  name: git-gateway
  repo: johnrgabriel-create/izcalli-preview-84004f
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c8691ac9-30ec-47e4-9909-f7199034e101/pkce
  auth_token_endpoint: /sites/c8691ac9-30ec-47e4-9909-f7199034e101/token
  gateway_url: https://gateway.decapbridge.com

# Commit messages tagged with the editor's name (from DecapBridge).
commit_messages:
  create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# PKCE identity claims (from DecapBridge).
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# CMS login-screen logo (DecapBridge).
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# "View site" link shown inside the editor.
site_url: https://johnrgabriel-create.github.io/izcalli-preview-84004f/

# Where uploaded images land (relative paths — this is a GitHub Pages project site).
media_folder: assets/img
public_folder: assets/img

collections:
  # --- Home page -------------------------------------------------------------
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home page
        file: content/home.json
        description: The homepage headline, intro, mission line, impact numbers, and the Men's Gathering banner.
        fields:
          - { name: hero_heading, label: Headline, widget: string }
          - { name: hero_intro, label: Intro paragraph, widget: text }
          - { name: mission_lead, label: Mission line, widget: text }
          - name: stats
            label: Impact numbers
            widget: list
            fields:
              - { name: number, label: Number, widget: string }
              - { name: label, label: Caption, widget: string }
          - { name: event_title, label: Event banner — title, widget: string }
          - { name: event_dates, label: Event banner — dates & place, widget: string }
          - { name: event_cta_label, label: Event banner — button text, widget: string }

  # --- Supporters wall -------------------------------------------------------
  - name: supporters
    label: Supporters
    files:
      - name: supporters
        label: Supporters wall
        file: content/supporters.json
        description: The funder logos shown on the Home and About pages.
        fields:
          - name: supporters
            label: Supporters
            widget: list
            summary: '{{fields.name}}'
            fields:
              - name: logo
                label: Logo image
                widget: image
                media_folder: /assets/img/funders
                public_folder: assets/img/funders
              - { name: name, label: Name, widget: string }
              - name: style
                label: Logo style
                widget: select
                default: ''
                options:
                  - { label: 'Normal (color logo on white)', value: '' }
                  - { label: 'Reverse (white logo on dark card)', value: 'dark' }
                  - { label: 'Seal + caption', value: 'seal' }
